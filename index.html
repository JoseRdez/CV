<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>José Rodríguez | Steadicam Operator</title>
  
  <style>
    /* === RESET BÁSICO === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; /* Cambia esto por tu fuente personalizada */
      background-color: var(--bg-color);
    }

    /* === VARIABLES DE COLOR === */
    :root {
      --bg-color: #f3f3ee;
      --red-accent: #c42127;
      --dark-text: #1a1a1a;
      --grid-line: rgba(0, 0, 0, 0.05);
    }

    /* === ESTRUCTURA PRINCIPAL === */
    .hero-section {
      background-color: var(--bg-color);
      /* Patrón de cuadrícula de fondo */
      background-image: 
        linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
      background-size: 20px 20px;
      padding: 2rem 1rem;
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    .hero-container {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr; /* Móvil por defecto: 1 columna */
      gap: 2rem;
      width: 100%;
      padding: 0 1rem;
    }

    /* === TIPOGRAFÍA Y TEXTOS === */
    .role-subtitle {
      color: var(--red-accent);
      letter-spacing: 2px;
      font-size: 0.8rem;
      font-family: monospace; /* Ajusta a tu fuente técnica */
      border-bottom: 1px solid var(--red-accent);
      display: inline-block;
      padding-bottom: 0.5rem;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
    }

    .main-title {
      font-size: clamp(4rem, 15vw, 8rem); /* Texto responsivo que no se sale de pantalla */
      line-height: 0.9;
      margin: 0 0 1.5rem 0;
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: -1px;
    }

    .text-black { color: var(--dark-text); }
    .text-red { color: var(--red-accent); }

    .description {
      color: var(--dark-text);
      font-size: 1.1rem;
      line-height: 1.6;
      max-width: 600px;
      margin-bottom: 2.5rem;
    }

    .portfolio-link {
      display: block;
      font-family: monospace;
      color: var(--dark-text);
      text-decoration: none;
      font-weight: bold;
      letter-spacing: 1px;
      border-bottom: 1px solid var(--dark-text);
      padding-bottom: 0.5rem;
      margin-bottom: 3rem;
      width: fit-content;
      text-transform: uppercase;
      transition: color 0.3s ease;
    }

    .portfolio-link:hover {
      color: var(--red-accent);
      border-bottom-color: var(--red-accent);
    }

    /* === ZONA DE STATS (Años activo, División, Idioma) === */
    .stats-grid {
      display: flex;
      flex-wrap: wrap; 
      gap: 2rem;
      justify-content: space-between;
      border-top: 1px solid var(--dark-text); 
      padding-top: 1.5rem;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      min-width: 100px; /* Evita que se aplasten demasiado */
    }

    .stat-number {
      font-size: 3rem;
      font-weight: 900;
      color: var(--red-accent);
      line-height: 1;
    }

    .stat-label {
      font-family: monospace;
      font-size: 0.75rem;
      letter-spacing: 1px;
      color: #666;
      margin-top: 0.5rem;
      text-transform: uppercase;
    }

    /* === GESTIÓN DE LA FOTO === */
    .profile-photo-circle {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 2px solid var(--red-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: monospace;
      font-size: 0.9rem;
      color: #888;
      overflow: hidden;
      margin: 2rem auto; /* Centrado en móvil */
      background: rgba(0,0,0,0.03);
    }

    /* Para cuando pongas la etiqueta <img> real */
    .profile-photo-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Control de visibilidad según pantalla */
    .hero-image-desktop { display: none; }
    .hero-image-mobile { display: block; }

    /* === ESCRITORIO (Media Query) === */
    @media (min-width: 900px) {
      .hero-container {
        grid-template-columns: 1.2fr 0.8fr; /* Divide el contenedor en 2 columnas */
        align-items: center;
      }

      .hero-image-mobile { display: none; } /* Ocultamos la foto en medio del texto */
      
      .hero-image-desktop { 
        display: flex; 
        justify-content: flex-end; 
      }

      .profile-photo-circle {
        width: 380px; /* Foto masiva en ordenador */
        height: 380px;
        margin: 0;
      }
    }
  </style>
</head>
<body>

  <section class="hero-section">
    <div class="hero-container">
      
      <!-- CONTENIDO TEXTUAL (Columna izquierda en escritorio / Todo en móvil) -->
      <div class="hero-text-content">
        <p class="role-subtitle">Steadicam Operator · Filmmaker · Madrid</p>
        
        <h1 class="main-title">
          <span class="text-black">JOSÉ</span><br>
          <span class="text-red">RODRÍGUEZ</span>
        </h1>

        <!-- Imagen visible solo en MÓVIL (intercalada para mejor lectura) -->
        <div class="hero-image-mobile">
          <div class="profile-photo-circle">
            <!-- Sustituye el span por tu etiqueta <img> cuando la tengas -->
            <span class="photo-placeholder">FOTO<br>PERFIL</span>
          </div>
        </div>

        <p class="description">
          Creador de <strong>MonteCarloFilms</strong>. Especializado en Steadicam & operación de cámara. Experiencia en eventos deportivos de élite, iluminación y montaje.
        </p>

        <a href="#portfolio" class="portfolio-link">VER PORTFOLIO ↓</a>

        <!-- Stats arreglados con Flexbox -->
        <div class="stats-grid">
          <div class="stat-item">
            <span class="stat-number">3+</span>
            <span class="stat-label">Años activo</span>
          </div>
          <div class="stat-item">
            <span class="stat-number">1ª</span>
            <span class="stat-label">División RFEF</span>
          </div>
          <div class="stat-item">
            <span class="stat-number">B2</span>
            <span class="stat-label">Cambridge</span>
          </div>
        </div>
      </div>

      <!-- IMAGEN DE ESCRITORIO (Columna derecha / Oculta en móvil) -->
      <div class="hero-image-desktop">
        <div class="profile-photo-circle">
          <!-- Sustituye el span por tu etiqueta <img> cuando la tengas -->
          <span class="photo-placeholder">FOTO<br>PERFIL</span>
        </div>
      </div>

    </div>
  </section>

</body>
</html>
